services:
  - type: web
    name: ma-soi-online-backend
    runtime: node
    branch: master
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - backend/**
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: CLIENT_ORIGIN
        sync: false
