name: CI

on:
  pull_request:
    branches: [Dev, master]
  push:
    branches: [Dev, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            services/lobby/package-lock.json
            services/roles/package-lock.json

      - name: Install gateway dependencies
        working-directory: backend
        run: npm ci

      - name: Install Lobby Service dependencies
        working-directory: services/lobby
        run: npm ci

      - name: Install Role Service dependencies
        working-directory: services/roles
        run: npm ci

      - name: Check server modules
        run: |
          node --check backend/src/server.js
          node --check services/lobby/src/server.js
          node --check services/lobby/src/app.js
          node --check services/roles/src/server.js
          node --check services/roles/src/app.js

      - name: Test role balancing and win conditions
        working-directory: services/roles
        run: npm test

      - name: Start backend services
        run: docker compose up --build --detach

      - name: Verify health endpoint
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:3001/health; then
              exit 0
            fi
            sleep 2
          done

          docker compose ps
          docker compose ps
          docker compose logs
          exit 1

      - name: Test multiplayer integration flow
        working-directory: backend
        run: npm run test:integration

      - name: Stop backend services
        if: always()
        run: docker compose down
