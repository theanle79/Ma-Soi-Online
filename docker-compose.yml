services:
  lobby-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ma_soi
      POSTGRES_PASSWORD: ma_soi
      POSTGRES_DB: ma_soi_lobby
    ports:
      - "5433:5432"
    volumes:
      - lobby_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ma_soi -d ma_soi_lobby"]
      interval: 5s
      timeout: 3s
      retries: 20

  role-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ma_soi
      POSTGRES_PASSWORD: ma_soi
      POSTGRES_DB: ma_soi_roles
    ports:
      - "5434:5432"
    volumes:
      - role_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ma_soi -d ma_soi_roles"]
      interval: 5s
      timeout: 3s
      retries: 20

  lobby:
    build: ./services/lobby
    environment:
      PORT: 3002
      LOBBY_DATABASE_URL: postgres://ma_soi:ma_soi@lobby-db:5432/ma_soi_lobby
    depends_on:
      lobby-db:
        condition: service_healthy
    expose:
      - "3002"

  roles:
    build: ./services/roles
    environment:
      PORT: 3003
      ROLE_DATABASE_URL: postgres://ma_soi:ma_soi@role-db:5432/ma_soi_roles
      LOBBY_SERVICE_URL: http://lobby:3002
    depends_on:
      role-db:
        condition: service_healthy
      lobby:
        condition: service_started
    expose:
      - "3003"

  gateway:
    build: ./backend
    environment:
      PORT: 3001
      LOBBY_SERVICE_URL: http://lobby:3002
      ROLE_SERVICE_URL: http://roles:3003
      CLIENT_ORIGIN: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      lobby:
        condition: service_started
      roles:
        condition: service_started
    ports:
      - "3001:3001"

volumes:
  lobby_postgres_data:
  role_postgres_data:
